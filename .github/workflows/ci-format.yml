name: CI Format

on:
  pull_request:

env:
  GO_VERSION: 1.24.x

jobs:
  check-format:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Golang
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run check-format script
        run: scripts/check-format.sh

